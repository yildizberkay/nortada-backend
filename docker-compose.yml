# Local development Postgres. Not used in production (Railway provides its own).
#   docker compose up -d db
services:
  db:
    image: postgres:17-alpine
    container_name: splash-postgres
    environment:
      POSTGRES_USER: splash
      POSTGRES_PASSWORD: splash
      POSTGRES_DB: splash
    ports:
      - "5432:5432"
    volumes:
      - splash-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splash -d splash"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  splash-pgdata:
