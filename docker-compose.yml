# Local development Postgres. Not used in production (Railway provides its own).
#   docker compose up -d db
services:
  db:
    image: postgres:17-alpine
    container_name: nortada-postgres
    environment:
      POSTGRES_USER: nortada
      POSTGRES_PASSWORD: nortada
      POSTGRES_DB: nortada
    ports:
      - "5432:5432"
    volumes:
      - nortada-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nortada -d nortada"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nortada-pgdata:
